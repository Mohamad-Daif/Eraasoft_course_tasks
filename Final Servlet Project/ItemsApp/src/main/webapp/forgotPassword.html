<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ItemVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
            position: relative;
        }

        .bg-mesh {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
            background:
                    radial-gradient(at 40% 20%, hsla(260,60%,50%,0.3) 0px, transparent 50%),
                    radial-gradient(at 80% 0%, hsla(189,100%,56%,0.2) 0px, transparent 50%),
                    radial-gradient(at 0% 50%, hsla(340,80%,60%,0.2) 0px, transparent 50%),
                    radial-gradient(at 80% 50%, hsla(280,70%,60%,0.2) 0px, transparent 50%),
                    radial-gradient(at 0% 100%, hsla(220,60%,50%,0.3) 0px, transparent 50%),
                    radial-gradient(at 80% 100%, hsla(260,60%,50%,0.2) 0px, transparent 50%);
            animation: meshMove 15s ease-in-out infinite;
        }

        @keyframes meshMove {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(2deg); }
        }

        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: particleFloat 25s infinite linear;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 20s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 25s; width: 6px; height: 6px; }
        .particle:nth-child(3) { left: 35%; animation-delay: 4s; animation-duration: 22s; }
        .particle:nth-child(4) { left: 50%; animation-delay: 0s; animation-duration: 18s; width: 8px; height: 8px; }
        .particle:nth-child(5) { left: 65%; animation-delay: 6s; animation-duration: 24s; }
        .particle:nth-child(6) { left: 80%; animation-delay: 3s; animation-duration: 20s; width: 5px; height: 5px; }
        .particle:nth-child(7) { left: 90%; animation-delay: 8s; animation-duration: 26s; }
        .particle:nth-child(8) { left: 15%; animation-delay: 5s; animation-duration: 23s; width: 3px; height: 3px; }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .forgot-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .forgot-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .logo-icon i {
            font-size: 32px;
            color: white;
            position: relative;
            z-index: 1;
        }

        .logo-section h1 {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .logo-section p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .form-input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .form-input:focus + i,
        .input-wrapper:focus-within i {
            color: #667eea;
        }

        .form-input.error {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        .form-input.success {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 6px;
            display: none;
            align-items: center;
            gap: 4px;
        }

        .error-message.show {
            display: flex;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .btn-primary.loading .btn-text {
            opacity: 0;
        }

        .btn-primary.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 24px;
        }

        .footer-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .footer-text a:hover {
            color: #a78bfa;
        }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: rgba(16, 185, 129, 0.9);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.9);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .toast.info {
            background: rgba(59, 130, 246, 0.9);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .toast i {
            font-size: 18px;
        }

        /* Password Display Modal */
        .password-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .password-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .password-modal {
            background: linear-gradient(135deg, rgba(30, 30, 60, 0.98), rgba(20, 20, 40, 0.98));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .password-modal-overlay.active .password-modal {
            transform: scale(1);
        }

        .password-modal i {
            font-size: 64px;
            color: #10b981;
            margin-bottom: 20px;
        }

        .password-modal h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: white;
        }

        .password-modal p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 24px;
            font-size: 14px;
        }

        .temp-password-box {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            position: relative;
        }

        .temp-password {
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: 700;
            color: #a78bfa;
            word-break: break-all;
            letter-spacing: 1px;
        }

        .copy-btn {
            margin-top: 12px;
            padding: 8px 20px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: #a78bfa;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            transform: translateY(-1px);
        }

        .modal-btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .modal-btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .modal-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .modal-btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        @media (max-width: 480px) {
            .forgot-card {
                padding: 28px 20px;
                border-radius: 20px;
            }

            .logo-section h1 {
                font-size: 24px;
            }

            .temp-password {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="container">
    <div class="forgot-card">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-key"></i>
            </div>
            <h1>Forgot Password?</h1>
            <p>Don't worry, we'll help you reset it</p>
        </div>

        <form id="forgotPasswordForm">
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-input" id="username" placeholder="Enter your username" autocomplete="username">
                </div>
                <div class="error-message" id="usernameError">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Username is required</span>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">
                <span class="btn-text">Generate Temporary Password</span>
            </button>
        </form>

        <div class="footer-text">
            Remember your password? <a href="login.html">Back to Login</a>
        </div>
    </div>
</div>

<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage">Success!</span>
</div>

<!-- Temporary Password Display Modal -->
<div class="password-modal-overlay" id="passwordModal">
    <div class="password-modal">
        <i class="fas fa-key"></i>
        <h2>Temporary Password Generated!</h2>
        <p>Please copy this temporary password and use it to reset your password.</p>
        <div class="temp-password-box">
            <div class="temp-password" id="tempPassword"></div>
            <button class="copy-btn" onclick="copyTempPassword()">
                <i class="fas fa-copy"></i> Copy Password
            </button>
        </div>
        <p style="font-size: 12px; color: #f59e0b;">
            <i class="fas fa-exclamation-triangle"></i> This password will be shown only once!
        </p>
        <div class="modal-btn-group">
            <button class="modal-btn modal-btn-primary" onclick="proceedToReset()">
                Proceed to Reset Password
            </button>
        </div>
    </div>
</div>

<script>
    let generatedPassword = '';

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        toastMessage.textContent = message;
        toast.className = `toast ${type} show`;
        toast.querySelector('i').className = type === 'success' ? 'fas fa-check-circle' :
                                            type === 'error' ? 'fas fa-exclamation-circle' : 'fas fa-info-circle';

        setTimeout(() => {
            toast.classList.remove('show');
        }, 4000);
    }

    function validateForm() {
        let isValid = true;
        const username = document.getElementById('username');

        if (!username.value.trim()) {
            document.getElementById('usernameError').classList.add('show');
            username.classList.add('error');
            isValid = false;
        } else {
            document.getElementById('usernameError').classList.remove('show');
            username.classList.remove('error');
            username.classList.add('success');
        }

        return isValid;
    }

    document.getElementById('username').addEventListener('input', () => {
        const input = document.getElementById('username');
        input.classList.remove('error', 'success');
        document.getElementById('usernameError').classList.remove('show');
    });

    document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!validateForm()) {
            document.querySelector('.forgot-card').classList.add('shake');
            setTimeout(() => document.querySelector('.forgot-card').classList.remove('shake'), 400);
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.classList.add('loading');

        try {
            const response = await fetch('http://localhost:8080/forgotpassword', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    username: document.getElementById('username').value.trim()
                })
            });

            if (response.ok) {
                generatedPassword = await response.text();
                document.getElementById('tempPassword').textContent = generatedPassword;
                document.getElementById('passwordModal').classList.add('active');
                showToast('Temporary password generated successfully!', 'success');
            } else {
                const error = await response.text();
                showToast(error || 'User not found. Please check your username.', 'error');
            }
        } catch (err) {
            console.error('Forgot password error:', err);
            showToast('Network error. Please check your connection.', 'error');
        } finally {
            submitBtn.classList.remove('loading');
        }
    });

    function copyTempPassword() {
        const tempPassword = document.getElementById('tempPassword').textContent;
        navigator.clipboard.writeText(tempPassword).then(() => {
            showToast('Password copied to clipboard!', 'success');
        }).catch(() => {
            showToast('Failed to copy password', 'error');
        });
    }

    function proceedToReset() {
        document.getElementById('passwordModal').classList.remove('active');
        // Store username and temp password in sessionStorage for reset page
        sessionStorage.setItem('resetUsername', document.getElementById('username').value.trim());
        sessionStorage.setItem('tempPassword', generatedPassword);
        window.location.href = 'resetPassword.html';
    }
</script>
</body>
</html>
