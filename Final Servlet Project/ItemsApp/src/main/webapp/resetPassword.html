<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - ItemVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
            position: relative;
        }

        .bg-mesh {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
            background:
                    radial-gradient(at 40% 20%, hsla(260,60%,50%,0.3) 0px, transparent 50%),
                    radial-gradient(at 80% 0%, hsla(189,100%,56%,0.2) 0px, transparent 50%),
                    radial-gradient(at 0% 50%, hsla(340,80%,60%,0.2) 0px, transparent 50%),
                    radial-gradient(at 80% 50%, hsla(280,70%,60%,0.2) 0px, transparent 50%),
                    radial-gradient(at 0% 100%, hsla(220,60%,50%,0.3) 0px, transparent 50%),
                    radial-gradient(at 80% 100%, hsla(260,60%,50%,0.2) 0px, transparent 50%);
            animation: meshMove 15s ease-in-out infinite;
        }

        @keyframes meshMove {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(2deg); }
        }

        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: particleFloat 25s infinite linear;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 20s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 25s; width: 6px; height: 6px; }
        .particle:nth-child(3) { left: 35%; animation-delay: 4s; animation-duration: 22s; }
        .particle:nth-child(4) { left: 50%; animation-delay: 0s; animation-duration: 18s; width: 8px; height: 8px; }
        .particle:nth-child(5) { left: 65%; animation-delay: 6s; animation-duration: 24s; }
        .particle:nth-child(6) { left: 80%; animation-delay: 3s; animation-duration: 20s; width: 5px; height: 5px; }
        .particle:nth-child(7) { left: 90%; animation-delay: 8s; animation-duration: 26s; }
        .particle:nth-child(8) { left: 15%; animation-delay: 5s; animation-duration: 23s; width: 3px; height: 3px; }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .reset-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .reset-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .logo-icon i {
            font-size: 32px;
            color: white;
            position: relative;
            z-index: 1;
        }

        .logo-section h1 {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .logo-section p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .form-input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .form-input:focus + i,
        .input-wrapper:focus-within i {
            color: #667eea;
        }

        .form-input.error {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        .form-input.success {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        .strength-meter {
            margin-top: 8px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .strength-meter.active {
            display: block;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: all 0.4s ease;
        }

        .strength-text {
            font-size: 12px;
            margin-top: 6px;
            font-weight: 500;
            display: none;
        }

        .strength-text.active {
            display: block;
        }

        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 6px;
            display: none;
            align-items: center;
            gap: 4px;
        }

        .error-message.show {
            display: flex;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .btn-primary.loading .btn-text {
            opacity: 0;
        }

        .btn-primary.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 24px;
        }

        .footer-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .footer-text a:hover {
            color: #a78bfa;
        }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: rgba(16, 185, 129, 0.9);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.9);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .toast.info {
            background: rgba(59, 130, 246, 0.9);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .toast i {
            font-size: 18px;
        }

        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .info-box i {
            font-size: 18px;
            color: #3b82f6;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        @media (max-width: 480px) {
            .reset-card {
                padding: 28px 20px;
                border-radius: 20px;
            }

            .logo-section h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="container">
    <div class="reset-card">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-lock"></i>
            </div>
            <h1>Reset Password</h1>
            <p>Create a new secure password</p>
        </div>

        <div class="info-box" id="infoBox">
            <i class="fas fa-info-circle"></i>
            <span>Using temporary password from forgot password process</span>
        </div>

        <form id="resetPasswordForm">
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-input" id="username" placeholder="Enter your username" readonly autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Temporary Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-key"></i>
                    <input type="password" class="form-input" id="currentPassword" placeholder="Enter the temporary password">
                    <button type="button" class="password-toggle" id="toggleCurrentPassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="error-message" id="currentPasswordError">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Temporary password is required</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">New Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-input" id="newPassword" placeholder="Create a new password">
                    <button type="button" class="password-toggle" id="toggleNewPassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="strength-meter" id="strengthMeter">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
                <div class="error-message" id="newPasswordError">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Password must be at least 6 characters</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm your new password">
                    <button type="button" class="password-toggle" id="toggleConfirmPassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="error-message" id="confirmPasswordError">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Passwords do not match</span>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">
                <span class="btn-text">Reset Password</span>
            </button>
        </form>

        <div class="footer-text">
            <a href="login.html">Back to Login</a>
        </div>
    </div>
</div>

<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage">Success!</span>
</div>

<script>
    // Load data from sessionStorage if coming from forgot password
    const storedUsername = sessionStorage.getItem('resetUsername');
    const storedTempPassword = sessionStorage.getItem('tempPassword');

    if (storedUsername) {
        document.getElementById('username').value = storedUsername;
    }

    if (storedTempPassword) {
        document.getElementById('currentPassword').value = storedTempPassword;
        document.getElementById('currentPassword').classList.add('success');
    }

    // Password strength meter
    const newPassword = document.getElementById('newPassword');
    newPassword.addEventListener('input', () => {
        const val = newPassword.value;
        const meter = document.getElementById('strengthMeter');
        const fill = document.getElementById('strengthFill');
        const text = document.getElementById('strengthText');

        if (val.length > 0) {
            meter.classList.add('active');
            text.classList.add('active');
        } else {
            meter.classList.remove('active');
            text.classList.remove('active');
            return;
        }

        let strength = 0;
        if (val.length >= 6) strength++;
        if (val.length >= 10) strength++;
        if (/[A-Z]/.test(val)) strength++;
        if (/[0-9]/.test(val)) strength++;
        if (/[^A-Za-z0-9]/.test(val)) strength++;

        const colors = ['#ef4444', '#f59e0b', '#3b82f6', '#10b981', '#059669'];
        const labels = ['Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
        const widths = ['20%', '40%', '60%', '80%', '100%'];

        const idx = Math.min(strength - 1, 4);
        fill.style.width = widths[idx] || '20%';
        fill.style.background = colors[idx] || '#ef4444';
        text.textContent = labels[idx] || 'Weak';
        text.style.color = colors[idx] || '#ef4444';
    });

    // Toggle password visibility
    function setupPasswordToggle(toggleId, inputId) {
        document.getElementById(toggleId).addEventListener('click', () => {
            const input = document.getElementById(inputId);
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;
            document.getElementById(toggleId).innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });
    }

    setupPasswordToggle('toggleCurrentPassword', 'currentPassword');
    setupPasswordToggle('toggleNewPassword', 'newPassword');
    setupPasswordToggle('toggleConfirmPassword', 'confirmPassword');

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        toastMessage.textContent = message;
        toast.className = `toast ${type} show`;
        toast.querySelector('i').className = type === 'success' ? 'fas fa-check-circle' :
                                            type === 'error' ? 'fas fa-exclamation-circle' : 'fas fa-info-circle';

        setTimeout(() => {
            toast.classList.remove('show');
        }, 4000);
    }

    function validateForm() {
        let isValid = true;
        const username = document.getElementById('username');
        const currentPassword = document.getElementById('currentPassword');
        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');

        if (!currentPassword.value.trim()) {
            document.getElementById('currentPasswordError').classList.add('show');
            currentPassword.classList.add('error');
            isValid = false;
        } else {
            document.getElementById('currentPasswordError').classList.remove('show');
            currentPassword.classList.remove('error');
            currentPassword.classList.add('success');
        }

        if (newPassword.value.length < 6) {
            document.getElementById('newPasswordError').classList.add('show');
            newPassword.classList.add('error');
            isValid = false;
        } else {
            document.getElementById('newPasswordError').classList.remove('show');
            newPassword.classList.remove('error');
            newPassword.classList.add('success');
        }

        if (newPassword.value !== confirmPassword.value) {
            document.getElementById('confirmPasswordError').classList.add('show');
            confirmPassword.classList.add('error');
            isValid = false;
        } else {
            document.getElementById('confirmPasswordError').classList.remove('show');
            confirmPassword.classList.remove('error');
            confirmPassword.classList.add('success');
        }

        return isValid;
    }

    // Clear errors on input
    const inputs = ['currentPassword', 'newPassword', 'confirmPassword'];
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
            const input = document.getElementById(id);
            input.classList.remove('error', 'success');
            const errorId = id + 'Error';
            const errorEl = document.getElementById(errorId);
            if (errorEl) errorEl.classList.remove('show');
        });
    });

    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!validateForm()) {
            document.querySelector('.reset-card').classList.add('shake');
            setTimeout(() => document.querySelector('.reset-card').classList.remove('shake'), 400);
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.classList.add('loading');

        try {
            const response = await fetch('http://localhost:8080/resetpassword', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                credentials: 'include',
                body: JSON.stringify({
                    username: document.getElementById('username').value.trim(),
                    currentPassword: document.getElementById('currentPassword').value.trim(),
                    newPassword: document.getElementById('newPassword').value
                })
            });

            if (response.ok) {
                showToast('Password reset successful! Redirecting to login...', 'success');
                // Clear session storage
                sessionStorage.removeItem('resetUsername');
                sessionStorage.removeItem('tempPassword');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                const error = await response.text();
                showToast(error || 'Password reset failed. Please check your credentials.', 'error');
                document.getElementById('currentPassword').value = '';
                document.getElementById('currentPassword').focus();
            }
        } catch (err) {
            console.error('Reset password error:', err);
            showToast('Network error. Please check your connection.', 'error');
        } finally {
            submitBtn.classList.remove('loading');
        }
    });
</script>
</body>
</html>
